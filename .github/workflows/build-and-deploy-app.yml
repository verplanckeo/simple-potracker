name: Docker Frontend deployment CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_pr:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: PR Build (no publish)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run prebuild:production && npm run build

      - name: Summary
        run: echo "## ✅ PR build completed (no publish)" >> $GITHUB_STEP_SUMMARY

  build_and_deploy_job:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run prebuild:production && npm run build

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: itigaidev.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t itigaidev.azurecr.io/simplepotracker:latest .
          docker push itigaidev.azurecr.io/simplepotracker:latest

      - name: Deployment summary
        run: echo "## 🚀 Deployment Successful — pushed itigaidev.azurecr.io/simplepotracker:latest" >> $GITHUB_STEP_SUMMARY
